[build]
  command = "pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/crm run build"
  publish = "artifacts/crm/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
